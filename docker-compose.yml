services:
  dockerlens:
    image: dockerlens
    build: .
    container_name: dockerlens
    restart: unless-stopped
    ports:
      - "${DOCKERLENS_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - READ_ONLY=false
    group_add:
      - "${DOCKER_GID:-999}"
