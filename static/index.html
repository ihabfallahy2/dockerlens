<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dockerlens</title>
  <style>
    :root {
      --bg: #f9f7f4;
      --panel: #ffffff;
      --panel-2: #f0ebe5;
      --text: #241f1c;
      --muted: #766e67;
      --line: #ded6ce;
      --accent: #d85a30;
      --accent-soft: #f4d3c7;
      --green: #2f9f65;
      --orange: #d78a22;
      --red: #cf3b37;
      --gray: #9a938d;
      --blue: #367dd6;
      --shadow: rgba(41, 29, 23, .12);
    }
    body.dark {
      --bg: #0e0e0f;
      --panel: #18181b;
      --panel-2: #232329;
      --text: #f0eff7;
      --muted: #a4a2b2;
      --line: #303039;
      --accent: #7f77dd;
      --accent-soft: #292749;
      --green: #45c477;
      --orange: #e3a032;
      --red: #f05a54;
      --gray: #777786;
      --blue: #6aa6ff;
      --shadow: rgba(0, 0, 0, .35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }
    button:hover { border-color: var(--accent); transform: translateY(-1px); }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(16px);
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
    }
    .topstats, .themes { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .theme-btn.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      padding: 24px;
    }
    .card {
      min-height: 250px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      cursor: pointer;
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 18px 46px color-mix(in srgb, var(--accent) 18%, var(--shadow));
      transform: translateY(-2px);
    }
    .card-top { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
    .name { margin: 0; font-size: 18px; overflow-wrap: anywhere; }
    .image { margin: 8px 0 16px; color: var(--muted); font-size: 13px; overflow-wrap: anywhere; }
    .badge { display: inline-flex; align-items: center; gap: 7px; border-radius: 999px; padding: 5px 9px; font-size: 12px; border: 1px solid var(--line); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--gray); }
    .running .dot, .error .dot { animation: pulse 1.25s ease-in-out infinite; }
    .running .dot { background: var(--green); }
    .stopped .dot { background: var(--gray); }
    .error .dot { background: var(--red); }
    @keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }
    .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
    .kv { min-width: 0; padding: 10px; background: var(--panel-2); border-radius: 8px; }
    .k { color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .v { margin-top: 4px; font-size: 13px; overflow-wrap: anywhere; }
    .bars { display: grid; gap: 10px; margin: 12px 0 16px; }
    .barrow { display: grid; grid-template-columns: 46px 1fr 48px; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; }
    .track { height: 8px; border-radius: 999px; background: var(--panel-2); overflow: hidden; }
    .fill { height: 100%; width: 0%; border-radius: 999px; transition: width .25s ease; }
    .bk { background: var(--green); }
    .bw { background: var(--orange); }
    .bc { background: var(--red); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .danger { color: var(--red); }
    .primary { color: var(--accent); }
    .empty { grid-column: 1 / -1; padding: 44px; color: var(--muted); text-align: center; border: 1px dashed var(--line); border-radius: 8px; }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(0, 0, 0, .48);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      width: min(1120px, 100%);
      max-height: min(88vh, 920px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .35);
    }
    .mhead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }
    .mhead h2 { margin: 0; font-size: 20px; overflow-wrap: anywhere; }
    .mhead p { margin: 4px 0 0; color: var(--muted); font-size: 13px; overflow-wrap: anywhere; }
    .mbody { overflow: auto; padding: 20px; }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .dc { min-width: 0; padding: 12px; border-radius: 8px; background: var(--panel-2); }
    .mini-bars { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin: 18px 0; }
    .log-section { margin-top: 18px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .log-head { display: flex; justify-content: space-between; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); color: var(--muted); font-size: 13px; }
    #logbox {
      height: 330px;
      overflow: auto;
      padding: 12px 14px;
      margin: 0;
      background: #09090a;
      color: #e8e8ec;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .log-warn { color: #f3b75d; }
    .log-error { color: #ff716b; }
    .log-info { color: #77b7ff; }
    @media (max-width: 780px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; padding: 16px; }
      .detail-grid, .mini-bars { grid-template-columns: 1fr; }
      .modal { max-height: 94vh; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">dockerlens</div>
    <div class="topstats">
      <span class="pill"><strong id="cnt-run">0</strong> running</span>
      <span class="pill"><strong id="cnt-stop">0</strong> stopped</span>
      <span class="pill" id="host-pill"><span class="dot"></span> Docker socket</span>
    </div>
    <div class="themes">
      <button class="theme-btn" id="theme-light" onclick="setTheme('light')">Dawn</button>
      <button class="theme-btn" id="theme-dark" onclick="setTheme('dark')">Dark</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="mhead">
        <div>
          <h2 id="m-name"></h2>
          <p id="m-image"></p>
        </div>
        <button onclick="closeModal()">✕</button>
      </div>
      <div class="mbody">
        <div class="detail-grid" id="detail-grid"></div>
        <div class="mini-bars" id="mini-bars"></div>
        <div class="log-section">
          <div class="log-head"><span>Logs</span><span id="ws-status">desconectado</span></div>
          <pre id="logbox"></pre>
        </div>
      </div>
    </div>
  </div>
  <script>
    let containers = [];
    let wsConn = null;
    let darkMode = false;

    function esc(v) {
      return String(v ?? "—").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }
    function barClass(v) { return v > 75 ? "bc" : v > 50 ? "bw" : "bk"; }
    function fmtBytes(b) {
      let n = Number(b || 0);
      const units = ["B", "KB", "MB", "GB"];
      let i = 0;
      while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(i ? 1 : 0)} ${units[i]}`;
    }
    function metricBar(label, value, isBytes) {
      const shown = isBytes ? fmtBytes(value) : `${Number(value || 0).toFixed(1)}%`;
      const width = isBytes ? Math.min(100, Math.log10(Number(value || 0) + 1) * 8) : Math.min(100, Number(value || 0));
      return `<div class="barrow"><span>${label}</span><div class="track"><div class="fill ${barClass(Number(value || 0))}" style="width:${width}%"></div></div><strong>${shown}</strong></div>`;
    }
    async function loadContainers() {
      try {
        const res = await fetch("/api/containers");
        if (!res.ok) throw new Error("socket");
        containers = await res.json();
        renderGrid();
        updateStats();
        const hp = document.getElementById("host-pill");
        hp.className = "pill running";
      } catch (err) {
        const hp = document.getElementById("host-pill");
        hp.className = "pill error";
      }
    }
    function updateStats() {
      const running = containers.filter(c => c.status === "running").length;
      document.getElementById("cnt-run").textContent = running;
      document.getElementById("cnt-stop").textContent = containers.length - running;
    }
    function renderGrid() {
      const grid = document.getElementById("grid");
      if (!containers.length) {
        grid.innerHTML = `<div class="empty">No hay contenedores Docker para mostrar.</div>`;
        return;
      }
      grid.innerHTML = containers.map(c => {
        const running = c.status === "running";
        const buttons = running
          ? `<button class="danger" onclick="action(event,'${esc(c.id)}','stop')">Stop</button><button class="primary" onclick="action(event,'${esc(c.id)}','restart')">Restart</button>`
          : `<button class="primary" onclick="action(event,'${esc(c.id)}','start')">Start</button>`;
        const bars = running
          ? `<div class="bars">${metricBar("CPU", c.cpu, false)}${metricBar("RAM", c.ram, false)}</div>`
          : `<div class="bars">${metricBar("CPU", 0, false)}${metricBar("RAM", 0, false)}</div>`;
        return `<article class="card ${esc(c.status)}" onclick="openModal('${esc(c.id)}')">
          <div class="card-top"><div><h3 class="name">${esc(c.name)}</h3><div class="image">${esc(c.image)}</div></div><span class="badge"><span class="dot"></span>${esc(c.status)}</span></div>
          <div class="meta"><div class="kv"><div class="k">Uptime</div><div class="v">${esc(c.uptime)}</div></div><div class="kv"><div class="k">Ports</div><div class="v">${esc(c.ports)}</div></div></div>
          ${bars}
          <div class="actions">${buttons}</div>
        </article>`;
      }).join("");
    }
    async function action(e, id, act) {
      e.stopPropagation();
      try {
        const res = await fetch(`/api/containers/${id}/${act}`, { method: "POST" });
        if (res.status === 403) {
          alert("Modo solo lectura activo");
          return;
        }
        if (!res.ok) alert("No se pudo ejecutar la acción");
        setTimeout(loadContainers, 800);
      } catch (err) {
        alert("No se pudo conectar con dockerlens");
      }
    }
    function openModal(id) {
      const c = containers.find(item => item.id === id);
      if (!c) return;
      document.getElementById("m-name").textContent = c.name;
      document.getElementById("m-image").textContent = c.image;
      const cells = [
        ["Container ID", c.id], ["Estado", c.status], ["Uptime", c.uptime], ["Puertos", c.ports],
        ["Restart policy", c.restart], ["Red(es)", c.network], ["Fecha de creación", c.created], ["Imagen completa", c.imageFull || c.image]
      ];
      document.getElementById("detail-grid").innerHTML = cells.map(([k, v]) => `<div class="dc"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join("");
      const running = c.status === "running";
      document.getElementById("mini-bars").innerHTML = running
        ? `${metricBar("CPU", c.cpu, false)}${metricBar("RAM", c.ram, false)}${metricBar("Net ↓", c.netIn, true)}${metricBar("Net ↑", c.netOut, true)}`
        : "";
      document.getElementById("logbox").innerHTML = "";
      document.getElementById("overlay").classList.add("open");
      startWS(id);
    }
    function closeModal() {
      document.getElementById("overlay").classList.remove("open");
      if (wsConn) {
        wsConn.close();
        wsConn = null;
      }
    }
    function colorLine(line) {
      const lower = line.toLowerCase();
      if (/(error|err|fatal|exception)/.test(lower)) return "log-error";
      if (/(warn|warning)/.test(lower)) return "log-warn";
      if (/(info|notice|started|ready)/.test(lower)) return "log-info";
      return "";
    }
    function startWS(id) {
      if (wsConn) wsConn.close();
      const proto = location.protocol === "https:" ? "wss" : "ws";
      wsConn = new WebSocket(`${proto}://${location.host}/ws/logs/${id}`);
      const box = document.getElementById("logbox");
      const status = document.getElementById("ws-status");
      wsConn.onopen = () => status.textContent = "conectado";
      wsConn.onclose = () => status.textContent = "desconectado";
      wsConn.onerror = () => status.textContent = "error";
      wsConn.onmessage = ev => {
        let line = ev.data || "";
        line = line.replace(/^(\S+Z)\s+/, "$1  ");
        const div = document.createElement("div");
        div.className = colorLine(line);
        div.textContent = line;
        box.appendChild(div);
        while (box.children.length > 300) box.removeChild(box.firstChild);
        box.scrollTop = box.scrollHeight;
      };
    }
    function setTheme(t) {
      darkMode = t === "dark";
      document.body.classList.toggle("dark", darkMode);
      document.getElementById("theme-light").classList.toggle("active", !darkMode);
      document.getElementById("theme-dark").classList.toggle("active", darkMode);
      localStorage.setItem("theme", t);
    }
    const saved = localStorage.getItem("theme") || "light";
    setTheme(saved);
    loadContainers();
    setInterval(loadContainers, 5000);
  </script>
</body>
</html>
